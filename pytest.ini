[pytest]
testpaths = tests
addopts = -v --tb=short
markers =
    e2e: end-to-end tests that cross process, transport, filesystem, or persistence boundaries
    slow: tests that are too slow for the default fast feedback loop
    gpu: tests requiring GPU/local model acceleration
    network: tests requiring network access
    live_ai: tests requiring live AI services, Ollama, cloud APIs, or heavyweight models
